run_name: nwm_cdit_s

# training setup
results_dir: logs
weights_dir: weights/checkpoints
artifact_dir: artifacts
train: True
batch_size: 16
num_workers: 12
model: CDiT-S/2
lr: 8e-5

normalize: True
grad_clip_val: 10.0
context_size: 4

distance:
  min_dist_cat: -64
  max_dist_cat: 64

len_traj_pred: 64

image_size: 224
text_conditioning:
  enabled: False
  embedding_root: null
  condition_source: current
  text_dim: 0
datasets:
  recon:
    data_folder: datasets/recon
    train: data_splits/recon/train/
    test: data_splits/recon/test/
    goals_per_obs: 4
  tartan_drive:
    data_folder: datasets/tartan_320
    train: data_splits/tartan_drive/train/
    test: data_splits/tartan_drive/test/
    goals_per_obs: 4
  sacson:
    data_folder: datasets/sacson_320
    train: data_splits/sacson/train
    test: data_splits/sacson/test
    goals_per_obs: 4
  scand:
    data_folder: datasets/scand_320
    train: data_splits/scand/train
    test: data_splits/scand/test
    goals_per_obs: 4
